<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 譜面在庫一覧 リアルタイム検索</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #f4f5f7;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .status {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .search-area {
            display: flex;
            margin-bottom: 20px;
        }
        .search-box {
            flex: 1;
            padding: 14px 20px;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
            outline: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #34495e;
            color: white;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background-color: #fcfcfc;
        }
        tr:hover {
            background-color: #f1f3f5;
        }
        .badge-sheet {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: #e2e8f0;
            color: #4a5568;
            font-size: 12px;
            font-weight: bold;
        }
        .no-result {
            text-align: center;
            padding: 30px;
            color: #95a5a6;
            font-size: 16px;
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" onkeydown="if(event.keyCode==123) return false;">

<div class="container">
    <h1>🎼 FF14 譜面在庫検索</h1>
    <div class="status" id="loadStatus">スプレッドシートからデータを読み込み中...</div>
    
    <div class="search-area">
        <input type="text" id="searchInput" class="search-box" placeholder="譜面名、カテゴリ、入手方法などで検索..." disabled>
    </div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th style="width: 15%;">対象シート</th>
                <th>タイトル</th>
                <th>取得箇所</th>
                <th>在庫</th>
                <th>マケボ出品数</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
    <div id="loadingView" class="loading">⏳ データを取得しています...</div>
</div>

<script src="search.js"></script>

</body>
</html>
