<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 譜面在庫一覧 | G Clef.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a2e;
            --cream: #f5f0e8;
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --blue-accent: #2471a3;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif JP', serif;
            background-color: var(--cream);
            color: var(--ink);
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 64px;
            background: rgba(245, 240, 232, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
        }
        .navbar-logo {
            font-family: 'Noto Serif JP', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.05em;
            text-decoration: none;
        }
        .navbar-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }
        .navbar-links a {
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.12em;
            color: var(--ink);
            opacity: 0.7;
            transition: opacity 0.2s, color 0.2s;
            font-family: 'Cinzel', serif;
        }
        .navbar-links a:hover,
        .navbar-links a.active {
            opacity: 1;
            color: var(--blue-accent);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1060px;
            margin: 0 auto;
            padding: 100px 40px 80px;
        }

        /* ===== PAGE HEADER ===== */
        .page-label {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.4em;
            color: var(--blue-accent);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(201, 168, 76, 0.4);
        }
        .status {
            font-size: 13px;
            color: rgba(26, 26, 46, 0.5);
            margin-bottom: 24px;
            letter-spacing: 0.05em;
        }

        /* ===== SEARCH ===== */
        .search-area {
            display: flex;
            margin-bottom: 28px;
        }
        .search-box {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(201, 168, 76, 0.5);
            border-radius: 3px;
            font-size: 15px;
            font-family: 'Noto Serif JP', serif;
            background: var(--white);
            color: var(--ink);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box::placeholder { color: rgba(26, 26, 46, 0.35); }
        .search-box:focus {
            border-color: var(--blue-accent);
            box-shadow: 0 0 0 3px rgba(36, 113, 163, 0.12);
            outline: none;
        }
        .search-box:disabled { opacity: 0.5; }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 14px;
            color: var(--blue-accent);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.2em;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(26, 26, 46, 0.07);
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(201, 168, 76, 0.18);
        }
        th {
            background: var(--ink);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
        }
        td {
            font-size: 13px;
            color: var(--ink);
        }
        tr:nth-child(even) {
            background-color: rgba(245, 240, 232, 0.6);
        }
        tr:hover {
            background-color: rgba(201, 168, 76, 0.1);
        }
        #tableBody tr { cursor: pointer; }

        /* Filter buttons */
        .filter-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(201, 168, 76, 0.5);
            background: var(--white);
            color: var(--ink);
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
        }
        .filter-btn:hover {
            background: rgba(201, 168, 76, 0.12);
            border-color: var(--gold);
        }
        .filter-btn.active {
            background: var(--ink);
            color: var(--gold-light);
            border-color: var(--ink);
        }
        .filter-btn:active { transform: scale(0.95); }
        @keyframes rowPop {
            0%   { transform: scale(1); }
            45%  { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        tr.row-pop td { animation: rowPop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* ===== BADGE ===== */
        .badge-sheet {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.45);
            color: var(--ink);
            font-size: 11px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .no-result {
            text-align: center;
            padding: 60px;
            color: rgba(26, 26, 46, 0.35);
            font-size: 13px;
            letter-spacing: 0.2em;
            font-family: 'Cinzel', serif;
        }

        /* ===== CART ===== */
        .cart-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 500;
            background: var(--ink);
            color: var(--gold-light);
            border: none;
            border-radius: 50px;
            padding: 12px 22px;
            font-size: 13px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(26, 26, 46, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.2s;
        }
        .cart-btn:hover { background: #2c3e50; transform: translateY(-2px); }
        .cart-badge {
            background: #c0392b;
            color: #fff;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-family: sans-serif;
        }
        .cart-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.5);
            z-index: 800;
        }
        .cart-panel {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(420px, 92vw);
            background: var(--cream);
            z-index: 900;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 32px rgba(26, 26, 46, 0.2);
            transform: translateX(100%);
            transition: transform 0.28s ease-in;
        }
        .cart-panel.open {
            transform: translateX(0);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .cart-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
            background: var(--ink);
            color: var(--gold-light);
            flex-shrink: 0;
        }
        .cart-panel-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2em;
            margin: 0;
        }
        .cart-close-btn {
            background: none; border: none; color: var(--gold-light);
            font-size: 18px; cursor: pointer; line-height: 1; padding: 0;
            opacity: 0.7; transition: opacity 0.2s;
        }
        .cart-close-btn:hover { opacity: 1; }
        .cart-body { flex: 1; overflow-y: auto; padding: 8px 0; }
        .cart-empty {
            text-align: center;
            color: rgba(26, 26, 46, 0.35);
            padding: 60px 28px;
            font-size: 13px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.12em;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-bottom: 1px solid rgba(201, 168, 76, 0.18);
            font-size: 13px;
        }
        .cart-item-title {
            flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            color: var(--ink);
        }
        .cart-item-remove {
            background: none; border: none; color: rgba(26, 26, 46, 0.25);
            cursor: pointer; font-size: 14px; flex-shrink: 0;
            padding: 2px 4px; transition: color 0.2s;
        }
        .cart-item-remove:hover { color: #c0392b; }
        .cart-footer {
            padding: 20px 28px;
            border-top: 1px solid rgba(201, 168, 76, 0.3);
            flex-shrink: 0;
        }
        .cart-count-text {
            font-size: 12px;
            color: rgba(26, 26, 46, 0.45);
            margin-bottom: 12px;
            text-align: center;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.12em;
        }
        .cart-price-box {
            background: var(--ink);
            color: var(--gold-light);
            border-radius: 2px;
            padding: 14px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .cart-price-label {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.15em;
            opacity: 0.75;
        }
        .cart-price-value {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .cart-price-note {
            font-size: 11px;
            color: rgba(26, 26, 46, 0.4);
            text-align: center;
            margin-bottom: 12px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
        }
        .cart-clear-btn {
            width: 100%; padding: 10px;
            background: var(--ink); color: var(--gold-light);
            border: none; border-radius: 2px;
            font-size: 12px; font-family: 'Cinzel', serif;
            letter-spacing: 0.12em;
            cursor: pointer; transition: opacity 0.2s;
        }
        .cart-clear-btn:hover { opacity: 0.8; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" onkeydown="if(event.keyCode==123) return false;">

<!-- NAVBAR -->
<nav class="navbar">
    <a href="Home.html" class="navbar-logo">G Clef.</a>
    <ul class="navbar-links">
        <li><a href="Home.html">TOP</a></li>
        <li><a href="Home.html#info">お知らせ</a></li>
        <li><a href="Home.html#system">システム</a></li>
        <li><a href="Home.html#price">金額</a></li>
        <li><a href="index.html" class="active">在庫検索</a></li>
    </ul>
</nav>

<div class="container">
    <p class="page-label">Inventory Search</p>
    <h1>FF14 譜面在庫検索</h1>
    <div class="status" id="loadStatus">スプレッドシートからデータを読み込み中...</div>

    <div class="search-area">
        <input type="text" id="searchInput" class="search-box" placeholder="譜面名、カテゴリ、入手方法などで検索..." disabled>
    </div>
    <div class="filter-area" id="filterArea"></div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th style="width: 40px;"></th>
                <th style="width: 15%;">カテゴリ</th>
                <th>タイトル</th>
                <th>取得箇所</th>
                <th>在庫</th>
                <th>マケボ出品数</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
    <div id="loadingView" class="loading">データを取得しています...</div>
</div>

<script src="search.js"></script>

<!-- Cart Button -->
<button class="cart-btn" id="cartBtn">🎵 カート <span class="cart-badge" id="cartBadge">0</span></button>

<!-- Cart Overlay & Panel -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-panel" id="cartPanel">
    <div class="cart-panel-header">
        <h2>選択中の譜面</h2>
        <button class="cart-close-btn" id="cartCloseBtn">✕</button>
    </div>
    <div class="cart-body" id="cartBody">
        <div class="cart-empty">譜面が選択されていません</div>
    </div>
    <div class="cart-footer">
        <p class="cart-count-text" id="cartCountText"></p>
        <div class="cart-price-box" id="cartPriceBox" style="display:none;">
            <span class="cart-price-label">お支払い合計</span>
            <span class="cart-price-value" id="cartPriceValue"></span>
        </div>
        <p class="cart-price-note" id="cartPriceNote"></p>
        <button class="cart-clear-btn" id="cartClearBtn">すべてクリア</button>
    </div>
</div>

<script>
(function() {
    const cartBtn       = document.getElementById('cartBtn');
    const cartBadge     = document.getElementById('cartBadge');
    const cartOverlay   = document.getElementById('cartOverlay');
    const cartPanel     = document.getElementById('cartPanel');
    const cartCloseBtn  = document.getElementById('cartCloseBtn');
    const cartBody      = document.getElementById('cartBody');
    const cartCountText = document.getElementById('cartCountText');
    const cartClearBtn  = document.getElementById('cartClearBtn');

    function calcPrice(count) {
        return Math.floor(count / 2) * 5000 + (count % 2) * 3000;
    }

    function openCart()  { cartOverlay.style.display = 'block'; cartPanel.classList.add('open'); }
    function closeCart() { cartOverlay.style.display = 'none';  cartPanel.classList.remove('open'); }

    cartBtn.addEventListener('click', openCart);
    cartOverlay.addEventListener('click', closeCart);
    cartCloseBtn.addEventListener('click', closeCart);
    cartClearBtn.addEventListener('click', () => { if (window._0xcartClear) window._0xcartClear(); });

    window.addEventListener('cartUpdate', (e) => {
        const { count, items } = e.detail;
        cartBadge.textContent = count;
        cartCountText.textContent = count > 0 ? `${count} 枚選択中` : '';

        const priceBox   = document.getElementById('cartPriceBox');
        const priceValue = document.getElementById('cartPriceValue');
        const priceNote  = document.getElementById('cartPriceNote');
        if (count > 0) {
            const total = calcPrice(count);
            priceBox.style.display = 'flex';
            priceValue.textContent = total.toLocaleString() + ' Gil';
            const pairs = Math.floor(count / 2), singles = count % 2;
            const parts = [];
            if (pairs)   parts.push(`${pairs}セット × 5,000`);
            if (singles) parts.push(`${singles}枚 × 3,000`);
            priceNote.textContent = parts.join(' + ');
        } else {
            priceBox.style.display = 'none';
            priceNote.textContent = '';
        }

        cartBody.innerHTML = '';

        if (count === 0) {
            cartBody.innerHTML = '<div class="cart-empty">譜面が選択されていません</div>';
            return;
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'cart-item';

            const badge = document.createElement('span');
            badge.className = 'badge-sheet';
            badge.style.flexShrink = '0';
            badge.textContent = item.sName;

            const title = document.createElement('span');
            title.className = 'cart-item-title';
            title.textContent = item.cells[0] || '';
            title.title = item.cells[0] || '';

            const removeBtn = document.createElement('button');
            removeBtn.className = 'cart-item-remove';
            removeBtn.textContent = '✕';
            removeBtn.title = '削除';
            removeBtn.addEventListener('click', () => {
                if (window._0xcartRemove) window._0xcartRemove(item._key);
            });

            div.appendChild(badge);
            div.appendChild(title);
            div.appendChild(removeBtn);
            cartBody.appendChild(div);
        });
    });
})();
</script>

</body>
</html>
