<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-image: url('BackGround.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .text-right {
      position: fixed;
      top: 30%;
      right: 13vw;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: clamp(2rem, 4vw, 1.5rem);
      letter-spacing: 0.25em;
      color: #ffffff;
      mix-blend-mode: difference;
      user-select: none;
      white-space: nowrap;
    }

    .text-left-bottom {
      position: fixed;
      bottom: 6vh;
      left: 13vw;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: 'Noto Serif JP', serif;
      font-weight: 200;
      font-size: clamp(0.85rem, 1.6vw, 1.2rem);
      letter-spacing: 0.4em;
      color: #ffffff;
      mix-blend-mode: difference;
      user-select: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="text-right">HNB</div>
  <div class="text-left-bottom">それはまぜまぜ</div>
</body>
</html>
