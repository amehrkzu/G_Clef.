<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>絶妖星乱舞 ─ 散会図</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="zetsumyosei_common.css">
  <style>
    html, body { display: flex; flex-direction: column; align-items: center; }

    .app {
      width: 100%; max-width: 520px;
      padding: 0 20px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    .conditions {
      width: 100%; margin-top: 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .cond-group {
      display: flex; flex-direction: column; gap: 4px;
      flex: 1; min-width: 100px;
      opacity: 0.38; transition: opacity 0.25s;
    }
    .cond-group.active { opacity: 1; }
    .cond-label  { font-size: 0.64rem; color: var(--text-dim); letter-spacing: 0.1em; }
    .cond-chips  { display: flex; flex-wrap: wrap; gap: 4px; }
    .cond-chip {
      padding: 2px 7px; border-radius: 4px;
      font-size: 0.72rem; font-weight: 600;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-light);
    }

    .roll-btn {
      padding: 10px 28px;
      background: rgba(201,168,76,0.1); border: 1px solid var(--gold);
      border-radius: 6px; color: var(--gold-light);
      font-family: 'Noto Serif JP', serif; font-size: 0.88rem;
      letter-spacing: 0.15em; cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s;
    }
    .roll-btn:hover {
      background: rgba(201,168,76,0.2);
      box-shadow: 0 0 16px rgba(201,168,76,0.25);
    }
  </style>
</head>

      <g id="p-mt" filter="url(#cf-glow)"><circle r="11" fill="#1a3a6a" stroke="#4a90d9" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#4a90d9" font-size="7" font-weight="bold">MT</text></g>

<script src="zetsumyosei_common.js"></script>
<script>
const LINE_DIR_LABEL = { 'AB':'AB平行', 'AB-R':'AB平行（反転）', 'AD':'AD平行', 'AD-R':'AD平行（反転）' };

function chip(text) {
  return `<span class="cond-chip">${text}</span>`;
}

function rollAndBuild() {
  const tobashiLine  = rnd(['th','dps']);
  const blizzAoe     = rnd(['ne-sw','nw-se']);
  const blizzResolve = rnd(['stack','spread']);
  const thBeam       = pick2(TH_ORDER);
  const dpsBeam      = pick2(DPS_ORDER);
  const thDebuff     = rnd(TH_ALL);
  const dpsDebuff    = rnd(DPS_ALL);
  const fanDir       = rnd(['NW-SE','NE-SW']);
  const lineDir      = rnd(['AB','AB-R','AD','AD-R']);
  const lineTrue     = rnd([true, false]);
  const fanTrue      = rnd([true, false]);
  const statue2ThDir   = rnd(['NW','NE']);
  const statue2FanAoe  = rnd(['NE-SW','NW-SE']);
  const statue2AoeList = statue2FanAoe === 'NE-SW' ? ['NE','SW'] : ['NW','SE'];

  const towerPos  = [...thBeam,...dpsBeam].map(r=>BEAM_LINE[r]);
  const blizzData = BLIZZFIRE[`${blizzAoe}_${blizzResolve}`];
  const [dp1,dp2] = computeDebuff(thDebuff, dpsDebuff);
  const fanAoe    = fanDir === 'NW-SE' ? ['NW','SE'] : ['NE','SW'];

  const timeline = [
    { mechId:'default', mechName:'開始前', name:'初期位置',
      positions:{ mt:[180,125], st:[178,225], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      assignments:[] },
    { mechId:'tobashi',   mechName:'神々の像（１回目）', ...TOBASHI[tobashiLine][0],
      kbLines: (tobashiLine==='th' ? ['mt','st','h1','h2'] : ['d1','d2','d3','d4']).map(r=>({role:r,x1:180,y1:0})) },
    { mechId:'tobashi',   mechName:'吹き飛ばし',       ...TOBASHI[tobashiLine][1], aoe:blizzData.aoe },
    { mechId:'blizzfire', mechName:'ブリザガ/ファイガ', name:(blizzResolve==='stack'?'頭割り':'散会'), positions:blizzData.positions, aoe:blizzData.aoe, assignments:blizzData.assignments },
    { mechId:'beam',      mechName:'ビーム・塔踏み',   name:'横並び', positions:{...BEAM_LINE}, towers:[], assignments:[{ chips:['H2','H1','ST','MT','D1','D2','D3','D4'], types:['h','h','t','t','m','m','r','r'], dest:'横一列に並ぶ' }] },
    { mechId:'beam',      mechName:'ビーム・塔踏み',   name:'塔出現', positions:{...BEAM_LINE}, towers:towerPos, assignments:[{ chips:['H2','H1','ST','MT','D1','D2','D3','D4'], types:['h','h','t','t','m','m','r','r'], dest:'塔の位置を確認' }] },
    { mechId:'beam',      mechName:'ビーム・塔踏み',   name:'塔踏み', positions:computeBeam(thBeam,dpsBeam), towers:towerPos, assignments:beamAssignments(thBeam,dpsBeam) },
    { mechId:'debuff',    mechName:'デバフ頭割り',     name:'集合', positions:dp1, assignments:debuffAssignments(thDebuff,dpsDebuff,0) },
    { mechId:'debuff',    mechName:'デバフ頭割り',     name:'KB後', positions:dp2, assignments:debuffAssignments(thDebuff,dpsDebuff,1) },
    { mechId:'nazotoki',  mechName:'なぞなぞマジック', name:'処理中',
      aoe:fanAoe, bands:lineDir,
      positions:computeNazotoki(fanDir, lineDir, lineTrue, fanTrue, dp2),
      assignments:[{ chips:['全員'], types:['t'], dest:'最寄り安置へ' }],
      lineTruth:lineTrue, fanTruth:fanTrue },
    { mechId:'default', mechName:'終了', name:'デフォルト位置',
      positions:{ mt:[180,125], st:[178,225], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      assignments:[] },
    { mechId:'hyperdrive', mechName:'ハイパードライブ後', name:'ポジション',
      positions:{ mt:[178,225], st:[180,125], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      assignments:[] },
    { mechId:'statue2', mechName:'神々の像（２回目）', name:'線出現',
      aoe:statue2AoeList,
      positions:{ mt:[178,225], st:[180,125], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      kbLines: [
        ...['mt','st','h1','h2'].map(r=>({ role:r, x1:statue2ThDir==='NW'?110:250, y1:25 })),
        ...['d1','d2','d3','d4'].map(r=>({ role:r, x1:statue2ThDir==='NW'?250:110, y1:25 })),
      ],
      assignments:[
        { chips:['MT','ST','H1','H2'], types:['t','t','h','h'], dest:`TH/H → ${statue2ThDir}から線` },
        { chips:['D1','D2','D3','D4'], types:['m','m','r','r'], dest:`DPS → ${statue2ThDir==='NW'?'NE':'NW'}から線` },
      ] },
    { mechId:'statue2', mechName:'神々の像（２回目）', name:'集合',
      aoe:statue2AoeList,
      positions:{ mt:[180,260], st:[180,260], h1:[180,260], h2:[180,260],
                  d1:[180,260], d2:[180,260], d3:[180,260], d4:[180,260] },
      kbLines: [
        ...['mt','st','h1','h2'].map(r=>({ role:r, x1:statue2ThDir==='NW'?110:250, y1:25 })),
        ...['d1','d2','d3','d4'].map(r=>({ role:r, x1:statue2ThDir==='NW'?250:110, y1:25 })),
      ],
      assignments:[{ chips:['全員'], types:['t'], dest:'C・中央間に集合' }] },
    { mechId:'graviga1', mechName:'グラビガ１回目', name:'設置',
      aoe:statue2AoeList,
      positions:{ mt:[180,260], st:[180,260], h1:[180,260], h2:[180,260],
                  d1:[180,260], d2:[180,260], d3:[180,260], d4:[180,260] },
      graviga: true,
      assignments:[{ chips:['全員'], types:['t'], dest:'自分の位置に円範囲設置' }] },
    { mechId:'graviga1', mechName:'グラビガ１回目', name:'散会',
      positions: computeGravigaSpread(statue2ThDir),
      gravigaFixed: true,
      assignments: gravigaSpreadAssignments(statue2ThDir) },
  ];

  document.getElementById('cc-tobashi').innerHTML   = chip(tobashiLine==='th'?'TH線':'DPS線');
  document.getElementById('cc-blizzfire').innerHTML = chip(blizzAoe==='ne-sw'?'NE+SW':'NW+SE') + chip(blizzResolve==='stack'?'頭割り':'散会');
  document.getElementById('cc-beam').innerHTML      = chip(`TH: ${thBeam.map(r=>r.toUpperCase()).join('・')}`) + chip(`DPS: ${dpsBeam.map(r=>r.toUpperCase()).join('・')}`);
  document.getElementById('cc-debuff').innerHTML    = chip(`TH: ${thDebuff.toUpperCase()}`) + chip(`DPS: ${dpsDebuff.toUpperCase()}`);
  document.getElementById('cc-nazotoki').innerHTML  = chip(fanDir==='NW-SE'?'NW+SE扇':'NE+SW扇') + chip(LINE_DIR_LABEL[lineDir]) + chip('扇：'+(fanTrue?'真':'偽')) + chip('直線：'+(lineTrue?'真':'偽'));
  document.getElementById('cc-statue2').innerHTML   = chip(statue2FanAoe==='NE-SW'?'NE+SW扇':'NW+SE扇');

  return timeline;
}

function nearest(cur, spotA, spotB) {
  const dA = Math.hypot(cur[0]-spotA[0], cur[1]-spotA[1]);
  const dB = Math.hypot(cur[0]-spotB[0], cur[1]-spotB[1]);
  return dA <= dB ? spotA : spotB;
}

let timeline = [];
let stepIdx  = 0;

function roll() {
  timeline = rollAndBuild();
  stepIdx  = 0;
  renderStep(timeline, stepIdx);
}

document.getElementById('nav-prev').addEventListener('click', () => {
  if (stepIdx>0) { stepIdx--; renderStep(timeline, stepIdx); }
});
document.getElementById('nav-next').addEventListener('click', () => {
  if (stepIdx<timeline.length-1) { stepIdx++; renderStep(timeline, stepIdx); }
});
document.getElementById('roll-btn').addEventListener('click', roll);
document.addEventListener('keydown', e => {
