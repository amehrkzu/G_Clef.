<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>絶妖星乱舞 ─ 散会図デバッグ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="zetsumyosei_common.css">
  <style>
    header { padding: 18px 24px 12px; }
    header h1 { font-size: clamp(1rem,3vw,1.5rem); }

    .layout {
      display: flex; flex-wrap: wrap;
      gap: 16px; padding: 16px 20px 40px;
      max-width: 900px; margin: 0 auto;
    }

    .ctrl-panel {
      flex: 0 0 220px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .ctrl-section {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ctrl-section-title {
      font-size: 0.65rem; color: var(--text-dim);
      letter-spacing: 0.12em; text-transform: uppercase;
      border-bottom: 1px solid var(--border); padding-bottom: 4px;
    }
    .ctrl-row { display: flex; flex-direction: column; gap: 3px; }
    .ctrl-row label { font-size: 0.68rem; color: var(--text-dim); }
    .ctrl-row select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: 'Noto Serif JP', serif;
      font-size: 0.76rem; padding: 4px 6px; border-radius: 4px;
      cursor: pointer; width: 100%;
    }
    .ctrl-row select:focus { outline: none; border-color: var(--gold); }

    .rnd-btn {
      padding: 8px 0; width: 100%;
      background: rgba(201,168,76,0.08); border: 1px solid var(--gold);
      border-radius: 6px; color: var(--gold-light);
      font-family: 'Noto Serif JP', serif; font-size: 0.82rem;
      letter-spacing: 0.12em; cursor: pointer;
      transition: background 0.18s;
    }
    .rnd-btn:hover { background: rgba(201,168,76,0.18); }

    .arena-panel {
      flex: 1; min-width: 280px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }

    @media (max-width: 560px) {
      .ctrl-panel { flex: 0 0 100%; }
    }
  </style>
</head>
<body>

<header><h1>絶妖星乱舞　散会図　─　デバッグ</h1></header>

<div class="layout">

  <div class="ctrl-panel">

    <div class="ctrl-section">
      <div class="ctrl-section-title">吹き飛ばし</div>
      <div class="ctrl-row">
        <label>KB対象</label>
        <select id="sel-tobashi">
          <option value="th">TH線</option>
          <option value="dps">DPS線</option>
        </select>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-section-title">ブリザガ / ファイガ</div>
      <div class="ctrl-row">
        <label>AoE方向</label>
        <select id="sel-blizz-dir">
          <option value="ne-sw">NE + SW</option>
          <option value="nw-se">NW + SE</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>処理</label>
        <select id="sel-blizz-resolve">
          <option value="stack">頭割り</option>
          <option value="spread">散会</option>
        </select>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-section-title">ビーム・塔踏み</div>
      <div class="ctrl-row">
        <label>THビーム受け（2人）</label>
        <select id="sel-th-beam">
          <option value="h2,h1">H2 + H1</option>
          <option value="h2,st">H2 + ST</option>
          <option value="h2,mt">H2 + MT</option>
          <option value="h1,st">H1 + ST</option>
          <option value="h1,mt">H1 + MT</option>
          <option value="st,mt">ST + MT</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>DPSビーム受け（2人）</label>
        <select id="sel-dps-beam">
          <option value="d1,d2">D1 + D2</option>
          <option value="d1,d3">D1 + D3</option>
          <option value="d1,d4">D1 + D4</option>
          <option value="d2,d3">D2 + D3</option>
          <option value="d2,d4">D2 + D4</option>
          <option value="d3,d4">D3 + D4</option>
        </select>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-section-title">デバフ頭割り</div>
      <div class="ctrl-row">
        <label>THデバフ持ち</label>
        <select id="sel-th-debuff">
          <option value="mt">MT</option>
          <option value="st">ST</option>
          <option value="h1">H1</option>
          <option value="h2">H2</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>DPSデバフ持ち</label>
        <select id="sel-dps-debuff">
          <option value="d1">D1</option>
          <option value="d2">D2</option>
          <option value="d3">D3</option>
          <option value="d4">D4</option>
        </select>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-section-title">なぞなぞマジック</div>
      <div class="ctrl-row">
        <label>扇範囲</label>
        <select id="sel-fan">
          <option value="NW-SE">NW + SE</option>
          <option value="NE-SW">NE + SW</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>直線方向</label>
        <select id="sel-line">
          <option value="AB">AB平行</option>
          <option value="AB-R">AB平行（反転）</option>
          <option value="AD">AD平行</option>
          <option value="AD-R">AD平行（反転）</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>直線：真偽</label>
        <select id="sel-line-truth">
          <option value="true">真</option>
          <option value="false">偽</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>扇：真偽</label>
        <select id="sel-fan-truth">
          <option value="true">真</option>
          <option value="false">偽</option>
        </select>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-section-title">神々の像（２回目）</div>
      <div class="ctrl-row">
        <label>TH/H線の方向</label>
        <select id="sel-statue2-th">
          <option value="NW">NW</option>
          <option value="NE">NE</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>扇範囲</label>
        <select id="sel-statue2-fan">
          <option value="NE-SW">NE + SW</option>
          <option value="NW-SE">NW + SE</option>
        </select>
      </div>
    </div>

    <button class="rnd-btn" id="rnd-btn">🎲 全条件ランダム</button>

  </div>

  <div class="arena-panel">

    <div class="mech-label">
      <div class="mech-name"  id="mech-name">─</div>
      <div class="mech-phase" id="mech-phase">─</div>
    </div>

    <div class="arena-wrap">
      <svg class="arena" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="cf-floor" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1e2a44"/>
            <stop offset="100%" stop-color="#0d1020"/>
          </radialGradient>
          <filter id="cf-glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="arena-clip">
            <circle cx="180" cy="180" r="155"/>
          </clipPath>
        </defs>

        <circle cx="180" cy="180" r="155" fill="url(#cf-floor)" stroke="#3a4a6a" stroke-width="1.5"/>

        <path id="aoe-NE" display="none" d="M 180,180 L 180,25 A 155,155 0 0,1 335,180 Z" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        <path id="aoe-SW" display="none" d="M 180,180 L 180,335 A 155,155 0 0,1 25,180 Z"  fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        <path id="aoe-NW" display="none" d="M 180,180 L 25,180 A 155,155 0 0,1 180,25 Z"   fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        <path id="aoe-SE" display="none" d="M 180,180 L 335,180 A 155,155 0 0,1 180,335 Z" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>

        <g id="bands-AD" display="none" clip-path="url(#arena-clip)">
          <rect x="-100" y="100" width="560" height="80" transform="rotate(-45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
          <rect x="-100" y="255" width="560" height="80" transform="rotate(-45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        </g>
        <g id="bands-AB" display="none" clip-path="url(#arena-clip)">
          <rect x="-100" y="100" width="560" height="80" transform="rotate(45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
          <rect x="-100" y="255" width="560" height="80" transform="rotate(45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        </g>
        <g id="bands-AD-R" display="none" clip-path="url(#arena-clip)">
          <rect x="-100" y="25"  width="560" height="80" transform="rotate(-45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
          <rect x="-100" y="180" width="560" height="80" transform="rotate(-45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        </g>
        <g id="bands-AB-R" display="none" clip-path="url(#arena-clip)">
          <rect x="-100" y="25"  width="560" height="80" transform="rotate(45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
          <rect x="-100" y="180" width="560" height="80" transform="rotate(45 180 180)" fill="rgba(210,50,50,0.22)" stroke="rgba(210,50,50,0.4)" stroke-width="1"/>
        </g>

        <line x1="180" y1="25"  x2="180" y2="335" stroke="#2a3a5a" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="25"  y1="180" x2="335" y2="180" stroke="#2a3a5a" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="70"  y1="70"  x2="290" y2="290" stroke="#1e2a44" stroke-width="1" stroke-dasharray="3,5"/>
        <line x1="290" y1="70"  x2="70"  y2="290" stroke="#1e2a44" stroke-width="1" stroke-dasharray="3,5"/>
        <circle cx="180" cy="180" r="100" fill="none" stroke="#2a3a5a" stroke-width="1"/>
        <circle cx="180" cy="180" r="5"   fill="#c9a84c" opacity="0.5"/>
        <circle cx="180" cy="180" r="2"   fill="#fff"/>

        <circle class="cf-tower" display="none" r="18" fill="rgba(201,168,76,0.07)" stroke="#c9a84c" stroke-width="1.8" stroke-dasharray="5,3"/>
        <circle class="cf-tower" display="none" r="18" fill="rgba(201,168,76,0.07)" stroke="#c9a84c" stroke-width="1.8" stroke-dasharray="5,3"/>
        <circle class="cf-tower" display="none" r="18" fill="rgba(201,168,76,0.07)" stroke="#c9a84c" stroke-width="1.8" stroke-dasharray="5,3"/>
        <circle class="cf-tower" display="none" r="18" fill="rgba(201,168,76,0.07)" stroke="#c9a84c" stroke-width="1.8" stroke-dasharray="5,3"/>

        <text x="180" y="69"  text-anchor="middle" fill="#ff5555" font-size="13" font-weight="bold">A</text>
        <text x="99"  y="103" text-anchor="middle" fill="#ff5555" font-size="13" font-weight="bold">1</text>
        <text x="261" y="103" text-anchor="middle" fill="#ffdd00" font-size="13" font-weight="bold">2</text>
        <text x="65"  y="184" text-anchor="middle" fill="#cc77ff" font-size="13" font-weight="bold">D</text>
        <text x="295" y="184" text-anchor="middle" fill="#ffdd00" font-size="13" font-weight="bold">B</text>
        <text x="180" y="299" text-anchor="middle" fill="#4499ff" font-size="13" font-weight="bold">C</text>
        <text x="99"  y="265" text-anchor="middle" fill="#cc77ff" font-size="13" font-weight="bold">4</text>
        <text x="261" y="265" text-anchor="middle" fill="#4499ff" font-size="13" font-weight="bold">3</text>

        <circle id="graviga-mt" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-st" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-h1" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-h2" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-d1" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-d2" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-d3" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>
        <circle id="graviga-d4" display="none" r="40" fill="rgba(180,60,230,0.18)" stroke="rgba(180,60,230,0.65)" stroke-width="1.5"/>

        <line id="kb-line-0" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-1" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-2" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-3" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-4" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-5" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-6" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
        <line id="kb-line-7" display="none" stroke="white" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>

        <g id="p-mt" filter="url(#cf-glow)"><circle r="11" fill="#1a3a6a" stroke="#4a90d9" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#4a90d9" font-size="7" font-weight="bold">MT</text></g>
        <g id="p-st" filter="url(#cf-glow)"><circle r="11" fill="#1a3a6a" stroke="#4a90d9" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#4a90d9" font-size="7" font-weight="bold">ST</text></g>
        <g id="p-h1" filter="url(#cf-glow)"><circle r="11" fill="#1a4030" stroke="#4caf7a" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#4caf7a" font-size="7" font-weight="bold">H1</text></g>
        <g id="p-h2" filter="url(#cf-glow)"><circle r="11" fill="#1a4030" stroke="#4caf7a" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#4caf7a" font-size="7" font-weight="bold">H2</text></g>
        <g id="p-d1" filter="url(#cf-glow)"><circle r="11" fill="#3a1010" stroke="#e05252" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#e05252" font-size="7" font-weight="bold">D1</text></g>
        <g id="p-d2" filter="url(#cf-glow)"><circle r="11" fill="#3a1010" stroke="#e05252" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#e05252" font-size="7" font-weight="bold">D2</text></g>
        <g id="p-d3" filter="url(#cf-glow)"><circle r="11" fill="#3a2010" stroke="#d4884e" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#d4884e" font-size="7" font-weight="bold">D3</text></g>
        <g id="p-d4" filter="url(#cf-glow)"><circle r="11" fill="#3a2010" stroke="#d4884e" stroke-width="1.8"/><text y="3.5" text-anchor="middle" fill="#d4884e" font-size="7" font-weight="bold">D4</text></g>
      </svg>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="nav-prev">◀</button>
      <span class="step-counter" id="step-counter">1 / 8</span>
      <button class="nav-btn" id="nav-next">▶</button>
    </div>

    <div class="assignments" id="assignments"></div>
    <div class="attack-note" id="attack-note"></div>
    <div class="hint">← → キーでステップ移動</div>

  </div>
</div>

<script src="zetsumyosei_common.js"></script>
<script>
function buildTimeline() {
  const tobashiLine  = document.getElementById('sel-tobashi').value;
  const blizzDir     = document.getElementById('sel-blizz-dir').value;
  const blizzResolve = document.getElementById('sel-blizz-resolve').value;
  const thBeam       = document.getElementById('sel-th-beam').value.split(',');
  const dpsBeam      = document.getElementById('sel-dps-beam').value.split(',');
  const thDebuff     = document.getElementById('sel-th-debuff').value;
  const dpsDebuff    = document.getElementById('sel-dps-debuff').value;
  const fanDir       = document.getElementById('sel-fan').value;
  const lineDir      = document.getElementById('sel-line').value;
  const lineTrue       = document.getElementById('sel-line-truth').value === 'true';
  const fanTrue        = document.getElementById('sel-fan-truth').value === 'true';
  const statue2ThDir   = document.getElementById('sel-statue2-th').value;
  const statue2FanAoe  = document.getElementById('sel-statue2-fan').value;
  const statue2AoeList = statue2FanAoe === 'NE-SW' ? ['NE','SW'] : ['NW','SE'];

  const towerPos  = [...thBeam,...dpsBeam].map(r=>BEAM_LINE[r]);
  const blizzData = BLIZZFIRE[`${blizzDir}_${blizzResolve}`];
  const [dp1,dp2] = computeDebuff(thDebuff, dpsDebuff);
  const fanAoe    = fanDir === 'NW-SE' ? ['NW','SE'] : ['NE','SW'];

  return [
    { mechId:'default', mechName:'開始前', name:'初期位置',
      positions:{ mt:[180,125], st:[178,225], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      assignments:[] },
    { mechId:'tobashi',   mechName:'神々の像（１回目）', ...TOBASHI[tobashiLine][0],
      kbLines: (tobashiLine==='th' ? ['mt','st','h1','h2'] : ['d1','d2','d3','d4']).map(r=>({role:r,x1:180,y1:0})) },
    { mechId:'tobashi',   mechName:'吹き飛ばし',       ...TOBASHI[tobashiLine][1], aoe:blizzData.aoe },
    { mechId:'blizzfire', mechName:'ブリザガ/ファイガ', name:(blizzResolve==='stack'?'頭割り':'散会'), positions:blizzData.positions, aoe:blizzData.aoe, assignments:blizzData.assignments },
    { mechId:'beam',      mechName:'ビーム・塔踏み',   name:'横並び', positions:{...BEAM_LINE}, towers:[], assignments:[{ chips:['H2','H1','ST','MT','D1','D2','D3','D4'], types:['h','h','t','t','m','m','r','r'], dest:'横一列に並ぶ' }] },
    { mechId:'beam',      mechName:'ビーム・塔踏み',   name:'塔出現', positions:{...BEAM_LINE}, towers:towerPos, assignments:[{ chips:['H2','H1','ST','MT','D1','D2','D3','D4'], types:['h','h','t','t','m','m','r','r'], dest:'塔の位置を確認' }] },
    { mechId:'beam',      mechName:'ビーム・塔踏み',   name:'塔踏み', positions:computeBeam(thBeam,dpsBeam), towers:towerPos, assignments:beamAssignments(thBeam,dpsBeam) },
    { mechId:'debuff',    mechName:'デバフ頭割り',     name:'集合', positions:dp1, assignments:debuffAssignments(thDebuff,dpsDebuff,0) },
    { mechId:'debuff',    mechName:'デバフ頭割り',     name:'KB後', positions:dp2, assignments:debuffAssignments(thDebuff,dpsDebuff,1) },
    { mechId:'nazotoki',  mechName:'なぞなぞマジック', name:'処理中',
      aoe:fanAoe, bands:lineDir,
      positions:computeNazotoki(fanDir, lineDir, lineTrue, fanTrue, dp2),
      assignments:[{ chips:['全員'], types:['t'], dest:'最寄り安置へ' }],
      lineTruth:lineTrue, fanTruth:fanTrue },
    { mechId:'default', mechName:'終了', name:'デフォルト位置',
      positions:{ mt:[180,125], st:[178,225], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      assignments:[] },
    { mechId:'hyperdrive', mechName:'ハイパードライブ後', name:'ポジション',
      positions:{ mt:[178,225], st:[180,125], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      assignments:[] },
    { mechId:'statue2', mechName:'神々の像（２回目）', name:'線出現',
      aoe:statue2AoeList,
      positions:{ mt:[178,225], st:[180,125], h1:[163,225], h2:[197,225],
                  d1:[154,248], d2:[172,248], d3:[188,248], d4:[206,248] },
      kbLines: [
        ...['mt','st','h1','h2'].map(r=>({ role:r, x1:statue2ThDir==='NW'?110:250, y1:25 })),
        ...['d1','d2','d3','d4'].map(r=>({ role:r, x1:statue2ThDir==='NW'?250:110, y1:25 })),
      ],
      assignments:[
        { chips:['MT','ST','H1','H2'], types:['t','t','h','h'], dest:`TH/H → ${statue2ThDir}から線` },
        { chips:['D1','D2','D3','D4'], types:['m','m','r','r'], dest:`DPS → ${statue2ThDir==='NW'?'NE':'NW'}から線` },
      ] },
    { mechId:'statue2', mechName:'神々の像（２回目）', name:'集合',
      aoe:statue2AoeList,
      positions:{ mt:[180,260], st:[180,260], h1:[180,260], h2:[180,260],
                  d1:[180,260], d2:[180,260], d3:[180,260], d4:[180,260] },
      kbLines: [
        ...['mt','st','h1','h2'].map(r=>({ role:r, x1:statue2ThDir==='NW'?110:250, y1:25 })),
        ...['d1','d2','d3','d4'].map(r=>({ role:r, x1:statue2ThDir==='NW'?250:110, y1:25 })),
      ],
      assignments:[{ chips:['全員'], types:['t'], dest:'C・中央間に集合' }] },
    { mechId:'graviga1', mechName:'グラビガ１回目', name:'設置',
      aoe:statue2AoeList,
      positions:{ mt:[180,260], st:[180,260], h1:[180,260], h2:[180,260],
                  d1:[180,260], d2:[180,260], d3:[180,260], d4:[180,260] },
      graviga: true,
      assignments:[{ chips:['全員'], types:['t'], dest:'自分の位置に円範囲設置' }] },
    { mechId:'graviga1', mechName:'グラビガ１回目', name:'散会',
      positions: computeGravigaSpread(statue2ThDir),
      gravigaFixed: true,
      assignments: gravigaSpreadAssignments(statue2ThDir) },
  ];
}

let timeline = [];
let stepIdx  = 0;

document.getElementById('nav-prev').addEventListener('click', () => {
  if (stepIdx>0) { stepIdx--; renderStep(timeline, stepIdx); }
});
document.getElementById('nav-next').addEventListener('click', () => {
  if (stepIdx<timeline.length-1) { stepIdx++; renderStep(timeline, stepIdx); }
});
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  document.getElementById('nav-prev').click();
  if (e.key==='ArrowRight') document.getElementById('nav-next').click();
});

document.querySelectorAll('select').forEach(sel => sel.addEventListener('change', () => {
  timeline = buildTimeline();
  renderStep(timeline, stepIdx);
}));

document.getElementById('rnd-btn').addEventListener('click', () => {
  const thBeamOpts  = ['h2,h1','h2,st','h2,mt','h1,st','h1,mt','st,mt'];
  const dpsBeamOpts = ['d1,d2','d1,d3','d1,d4','d2,d3','d2,d4','d3,d4'];
  document.getElementById('sel-tobashi').value       = rnd(['th','dps']);
  document.getElementById('sel-blizz-dir').value     = rnd(['ne-sw','nw-se']);
  document.getElementById('sel-blizz-resolve').value = rnd(['stack','spread']);
  document.getElementById('sel-th-beam').value       = rnd(thBeamOpts);
  document.getElementById('sel-dps-beam').value      = rnd(dpsBeamOpts);
  document.getElementById('sel-th-debuff').value     = rnd(['mt','st','h1','h2']);
  document.getElementById('sel-dps-debuff').value    = rnd(['d1','d2','d3','d4']);
  document.getElementById('sel-fan').value           = rnd(['NW-SE','NE-SW']);
  document.getElementById('sel-line').value          = rnd(['AB','AB-R','AD','AD-R']);
  document.getElementById('sel-line-truth').value    = rnd(['true','false']);
  document.getElementById('sel-fan-truth').value     = rnd(['true','false']);
  document.getElementById('sel-statue2-th').value    = rnd(['NW','NE']);
  document.getElementById('sel-statue2-fan').value   = rnd(['NE-SW','NW-SE']);
  stepIdx = 0;
  timeline = buildTimeline();
  renderStep(timeline, stepIdx);
});

ROLES.forEach(r => applyPos(r, ...BEAM_LINE[r]));
timeline = buildTimeline();
renderStep(timeline, stepIdx);
</script>
