<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF14 8方向散会図</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
      gap: 24px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #c8a96e;
      text-shadow: 0 0 12px #c8a96e66;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
    }

    /* ─── Arena ─── */
    .arena-wrap {
      position: relative;
      width: 360px;
      height: 360px;
    }

    svg.arena {
      width: 100%;
      height: 100%;
    }

    /* ─── Legend / Role list ─── */
    .legend {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px 24px;
      min-width: 220px;
    }

    .legend h2 {
      font-size: 1rem;
      color: #c8a96e;
      margin-bottom: 14px;
      letter-spacing: 0.1em;
    }

    .role-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #1e2a44;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
      padding-left: 4px;
    }
    .role-row:last-child { border-bottom: none; }
    .role-row:hover { background: #1e2a44; }

    .role-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .role-label { font-weight: 600; width: 32px; flex-shrink: 0; }
    .role-pos   { color: #aaa; font-size: 0.82rem; }


    /* ─── Color scheme ─── */
    .c-mt   { background: #4a90d9; }
    .c-st   { background: #4a90d9; }
    .c-h1   { background: #4caf7a; }
    .c-h2   { background: #4caf7a; }
    .c-d1   { background: #e05252; }
    .c-d2   { background: #e05252; }
    .c-d3   { background: #d4884e; }
    .c-d4   { background: #d4884e; }

    /* ─── Notes ─── */
    .notes {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 600px;
      width: 100%;
      font-size: 0.85rem;
      line-height: 1.7;
      color: #bbb;
    }
    .notes h2 { color: #c8a96e; margin-bottom: 8px; font-size: 0.95rem; }
    .notes ul { padding-left: 1.2em; }
    .notes li { margin-bottom: 4px; }

    .tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-right: 2px;
    }
    .tag-t { background: #1a4080; color: #7ab4ff; }
    .tag-h { background: #1a4030; color: #7affaa; }
    .tag-m { background: #4a1010; color: #ff9090; }
    .tag-r { background: #3a2010; color: #ffcc80; }
  </style>
</head>
<body>

<h1>FF14 ― 8方向散会図</h1>

<div class="container">

  <!-- Arena SVG -->
  <div class="arena-wrap">
    <svg class="arena" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="floor" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#1e2a44"/>
          <stop offset="100%" stop-color="#111827"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Arena floor -->
      <circle cx="180" cy="180" r="155" fill="url(#floor)" stroke="#2a3a5a" stroke-width="2"/>

      <!-- Grid lines (cardinal) -->
      <line x1="180" y1="25"  x2="180" y2="335" stroke="#2a3a5a" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="25"  y1="180" x2="335" y2="180" stroke="#2a3a5a" stroke-width="1" stroke-dasharray="4,4"/>

      <!-- Grid lines (diagonal) -->
      <line x1="70"  y1="70"  x2="290" y2="290" stroke="#1e2d44" stroke-width="1" stroke-dasharray="3,5"/>
      <line x1="290" y1="70"  x2="70"  y2="290" stroke="#1e2d44" stroke-width="1" stroke-dasharray="3,5"/>

      <!-- Compass ring -->
      <circle cx="180" cy="180" r="130" fill="none" stroke="#2a3a5a" stroke-width="1"/>
      <!-- Outer ring -->
      <circle cx="180" cy="180" r="155" fill="none" stroke="#3a4a6a" stroke-width="1.5"/>

      <!-- Center marker -->
      <circle cx="180" cy="180" r="6" fill="#c8a96e" opacity="0.6"/>
      <circle cx="180" cy="180" r="2" fill="#fff"/>

      <!-- ── Role markers ──
           Radius 130 from center (180,180)
           N=0°, NE=45°, E=90°, SE=135°, S=180°, SW=225°, W=270°, NW=315°
           x = 180 + 130*sin(θ),  y = 180 - 130*cos(θ)
      -->

      <!-- MT  – N  (180, 80) -->
      <g filter="url(#glow)" id="mk-mt">
        <circle cx="180" cy="80"  r="18" fill="#1a3a6a" stroke="#4a90d9" stroke-width="2.5"/>
        <text x="180" y="84" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="bold">MT</text>
      </g>

      <!-- H1  – NW (109, 109) -->
      <g filter="url(#glow)" id="mk-h1">
        <circle cx="109" cy="109" r="18" fill="#1a4030" stroke="#4caf7a" stroke-width="2.5"/>
        <text x="109" y="113" text-anchor="middle" fill="#4caf7a" font-size="10" font-weight="bold">H1</text>
      </g>

      <!-- H2  – NE (251, 109) -->
      <g filter="url(#glow)" id="mk-h2">
        <circle cx="251" cy="109" r="18" fill="#1a4030" stroke="#4caf7a" stroke-width="2.5"/>
        <text x="251" y="113" text-anchor="middle" fill="#4caf7a" font-size="10" font-weight="bold">H2</text>
      </g>

      <!-- D1  – W  (80, 180) -->
      <g filter="url(#glow)" id="mk-d1">
        <circle cx="80"  cy="180" r="18" fill="#3a1010" stroke="#e05252" stroke-width="2.5"/>
        <text x="80"  y="184" text-anchor="middle" fill="#e05252" font-size="10" font-weight="bold">D1</text>
      </g>

      <!-- D2  – E  (280, 180) -->
      <g filter="url(#glow)" id="mk-d2">
        <circle cx="280" cy="180" r="18" fill="#3a1010" stroke="#e05252" stroke-width="2.5"/>
        <text x="280" y="184" text-anchor="middle" fill="#e05252" font-size="10" font-weight="bold">D2</text>
      </g>

      <!-- ST  – S  (180, 280) -->
      <g filter="url(#glow)" id="mk-st">
        <circle cx="180" cy="280" r="18" fill="#1a3a6a" stroke="#4a90d9" stroke-width="2.5"/>
        <text x="180" y="284" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="bold">ST</text>
      </g>

      <!-- D3  – SW (109, 251) -->
      <g filter="url(#glow)" id="mk-d3">
        <circle cx="109" cy="251" r="18" fill="#3a2010" stroke="#d4884e" stroke-width="2.5"/>
        <text x="109" y="255" text-anchor="middle" fill="#d4884e" font-size="10" font-weight="bold">D3</text>
      </g>

      <!-- D4  – SE (251, 251) -->
      <g filter="url(#glow)" id="mk-d4">
        <circle cx="251" cy="251" r="18" fill="#3a2010" stroke="#d4884e" stroke-width="2.5"/>
        <text x="251" y="255" text-anchor="middle" fill="#d4884e" font-size="10" font-weight="bold">D4</text>
      </g>

      <!-- ── Field markers ── -->
      <text x="180" y="69"  text-anchor="middle" fill="#ff5555" font-size="13" font-weight="bold">A</text>
      <text x="99"  y="103" text-anchor="middle" fill="#ff5555" font-size="13" font-weight="bold">1</text>
      <text x="261" y="103" text-anchor="middle" fill="#ffdd00" font-size="13" font-weight="bold">2</text>
      <text x="65"  y="184" text-anchor="middle" fill="#cc77ff" font-size="13" font-weight="bold">D</text>
      <text x="295" y="184" text-anchor="middle" fill="#ffdd00" font-size="13" font-weight="bold">B</text>
      <text x="180" y="299" text-anchor="middle" fill="#4499ff" font-size="13" font-weight="bold">C</text>
      <text x="99"  y="265" text-anchor="middle" fill="#cc77ff" font-size="13" font-weight="bold">4</text>
      <text x="261" y="265" text-anchor="middle" fill="#4499ff" font-size="13" font-weight="bold">3</text>

    </svg>
  </div>

  <!-- Legend -->
  <div class="legend">
    <h2>ロール配置</h2>

    <div class="role-row">
      <div class="role-dot c-mt"></div>
      <span class="role-label">MT</span>
      <span style="color:#ff5555;font-weight:bold;">A</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-h1"></div>
      <span class="role-label">H1</span>
      <span style="color:#ff5555;font-weight:bold;">1</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-h2"></div>
      <span class="role-label">H2</span>
      <span style="color:#ffdd00;font-weight:bold;">2</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-d1"></div>
      <span class="role-label">D1</span>
      <span style="color:#cc77ff;font-weight:bold;">D</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-d2"></div>
      <span class="role-label">D2</span>
      <span style="color:#ffdd00;font-weight:bold;">B</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-st"></div>
      <span class="role-label">ST</span>
      <span style="color:#4499ff;font-weight:bold;">C</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-d3"></div>
      <span class="role-label">D3</span>
      <span style="color:#cc77ff;font-weight:bold;">4</span>
    </div>
    <div class="role-row">
      <div class="role-dot c-d4"></div>
      <span class="role-label">D4</span>
      <span style="color:#4499ff;font-weight:bold;">3</span>
    </div>

    <div style="margin-top:18px; border-top:1px solid #2a2a4a; padding-top:14px; font-size:0.8rem; line-height:1.8;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <span class="tag tag-t">T</span><span style="color:#aaa">タンク</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
        <span class="tag tag-h">H</span><span style="color:#aaa">ヒーラー</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
        <span class="tag tag-m">D1/D2</span><span style="color:#aaa">近接DPS</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
        <span class="tag tag-r">D3/D4</span><span style="color:#aaa">遠隔DPS</span>
      </div>
    </div>
  </div>

</div>

<!-- Notes -->
<div class="notes">
  <h2>散会の基本ルール</h2>
  <ul>
    <li>各自が担当の方向へ散会し、<strong>AoEの重なりを防ぐ</strong>。</li>
    <li>タンクは<span class="tag tag-t">MT</span>がボス正面、<span class="tag tag-t">ST</span>が対面が基本。ボスの向き固定に注意。</li>
    <li>ヒーラーは<span class="tag tag-h">H1/H2</span>が斜め後方に位置し、視野を確保。</li>
    <li>近接DPS (<span class="tag tag-m">D1/D2</span>) はボス側面。遠隔/魔法 (<span class="tag tag-r">D3/D4</span>) は後方斜め。</li>
    <li>コンテンツによって担当方向が異なる場合があります。必ず攻略メモを確認してください。</li>
  </ul>
</div>

</body>
</html>
